 <path d="M1358,1080 L1360,1044 L1354,1044 Z"/>
 <path d="M1392,1080 L1394,1050 L1388,1050 Z"/>
 <path d="M1512,1080 L1514,1046 L1508,1046 Z"/>
 <path d="M1548,1080 L1551,1054 L1544,1054 Z"/>
 <path d="M1672,1080 L1674,1048 L1668,1048 Z"/>
 <path d="M1712,1080 L1714,1052 L1708,1052 Z"/>
 <path d="M1828,1080 L1830,1044 L1824,1044 Z"/>
 <path d="M1872,1080 L1874,1050 L1868,1050 Z"/>
 </g>
</svg>
