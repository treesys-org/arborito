# Verifica que Tailwind compile; mantiene coherente el CSS servido en GitHub Pages.
# Este workflow es para el repo cuya raíz es `arborito/`.
name: Arborito CSS

on:
  push:
    paths:
      - "package.json"
      - "package-lock.json"
      - "src/styles/**"
      - "tailwind.config.js"
      - ".github/workflows/arborito-css.yml"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "src/styles/**"
      - "tailwind.config.js"

jobs:
  build-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Build Tailwind
        run: npm run build:css:min

