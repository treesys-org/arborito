# Deploy Arborito (static app) to GitHub Pages.
# This file is meant for the repo whose ROOT is the `arborito/` folder.
name: Arborito Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - "**"
      - ".github/workflows/arborito-pages.yml"
      - ".github/workflows/arborito-css.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build Tailwind (min)
        run: npm run build:css:min

      - name: Stamp build id (cache bust)
        run: |
          node -e "const fs=require('fs');const p='src/version.js';const sha=process.env.GITHUB_SHA||'';const short=sha?sha.slice(0,10):'dev';const d=new Date();const iso=d.toISOString().slice(0,19).replace(/[:T]/g,'-');const id=`${iso}-${short}`;let s=fs.readFileSync(p,'utf8');s=s.replace(/export const ARBORITO_BUILD_ID\\s*=\\s*'[^']*'\\s*;?/m,`export const ARBORITO_BUILD_ID = '${id}';`);fs.writeFileSync(p,s);console.log('ARBORITO_BUILD_ID=',id);"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

