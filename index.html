
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Nostr: vendored `nostr-tools` + `@noble/*` under `./vendor/`. Each entry ends in `.js` so static servers (e.g. `python -m http.server`) return `application/javascript`, not an HTML 404. -->
  <!-- COOP / COEP shim — only useful for HTTP(S) deployments that cannot set
       response headers directly (e.g. GitHub Pages) so wllama can use
       SharedArrayBuffer. In Electron the desktop renderer talks to native
       llama.cpp via IPC and does not need SAB; worse, a stale registration of
       this service worker under file:// would intercept the top-level
       navigation and fail it with ERR_FAILED. Skip it whenever we detect
       Electron OR the file: scheme. -->
  <script>
    (function () {
      var isFile = window.location && window.location.protocol === 'file:';
      var isElectron =
        (navigator.userAgent || '').toLowerCase().indexOf('electron') !== -1 ||
        (typeof process !== 'undefined' && process.versions && process.versions.electron);
      if (isFile || isElectron) return;
      var s = document.createElement('script');
      s.src = 'coi-serviceworker.min.js';
      document.currentScript.parentNode.insertBefore(s, document.currentScript.nextSibling);
    })();
  </script>
  <script type="importmap">
  {
    "imports": {
      "@noble/ciphers/aes": "./vendor/deps/noble-ciphers/esm/aes.js",
      "@noble/ciphers/chacha": "./vendor/deps/noble-ciphers/esm/chacha.js",
      "@noble/ciphers/crypto": "./vendor/deps/noble-ciphers/esm/crypto.js",
      "@noble/ciphers/utils": "./vendor/deps/noble-ciphers/esm/utils.js",
      "@noble/curves/secp256k1": "./vendor/deps/noble-curves/esm/secp256k1.js",
      "@noble/hashes/crypto": "./vendor/deps/noble-hashes/esm/crypto.js",
      "@noble/hashes/hkdf": "./vendor/deps/noble-hashes/esm/hkdf.js",
      "@noble/hashes/hmac": "./vendor/deps/noble-hashes/esm/hmac.js",
      "@noble/hashes/scrypt": "./vendor/deps/noble-hashes/esm/scrypt.js",
      "@noble/hashes/sha256": "./vendor/deps/noble-hashes/esm/sha256.js",
      "@noble/hashes/utils": "./vendor/deps/noble-hashes/esm/utils.js",
      "@scure/base": "./vendor/deps/scure-base/lib/esm/index.js"
    }
  }
  </script>
  <!-- CSP: third-party script CDN = jsDelivr (only the wllama AI worker, and only after explicit in-browser AI consent).
       Hardening notes:
         · `'unsafe-eval'` is NOT granted (no `eval` / `new Function` in `src/`).
           Replaced by `'wasm-unsafe-eval'` so WASM (wllama) can compile without opening eval.
         · `connect-src *` and redundant origins (HF / S3 / CloudFront) were dropped; they are
           already covered by `https: http: wss: ws: blob:`. Shorter list, same behavior.
         · `'unsafe-inline'` and jsDelivr stay in script-src + worker-src: the importmap inline
           above requires the former, and the wllama worker calls `importScripts()` internally.
       Future audit: replace `'unsafe-inline'` with nonces/hashes once the importmap is moved out.
         · style-src includes raw.githubusercontent.com: official cartridges from arborito-games
           load `/tailwind.css` via game-player into iframe srcdoc; without this origin the CSP
           blocks the CSS. -->
  <!-- `file:` scheme is added to script/worker/style/font/img/default sources so the
       Electron desktop build (loaded via `mainWindow.loadFile('index.html')`) can pull
       sibling `./src/**` and `./vendor/**` assets. Under file://, the document origin
       is opaque, so `'self'` does NOT match sibling file:// URLs — without `file:`
       Chromium blocks every script and stylesheet and the app stalls at the inline
       loading spinner. Over http(s) the `file:` source matches no real subresource,
       so the relaxation is a no-op for the hosted (GitHub Pages) build. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; script-src 'self' file: 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net blob:; worker-src 'self' file: blob: https://cdn.jsdelivr.net; style-src 'self' file: 'unsafe-inline' https://raw.githubusercontent.com; font-src 'self' file: data:; img-src 'self' file: data:; connect-src 'self' file: https: http: wss: ws: blob: data:;">

  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#a8e8ff">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#312e81">

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
