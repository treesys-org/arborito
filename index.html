  <!-- Boot splash: inline CSS so the spinner paints before Tailwind (main.css loads in parallel below). -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('arborito-theme');
        if (t !== 'dark' && t !== 'light') {
          t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        var root = document.documentElement;
        root.classList.remove('dark', 'light');
        if (t === 'dark') root.classList.add('dark');
        else root.classList.add('light');
        root.style.colorScheme = t === 'dark' ? 'dark' : 'light';
        var meta = document.querySelector('meta[name="theme-color"]:not([media])');
        if (!meta) {
          meta = document.createElement('meta');
          meta.setAttribute('name', 'theme-color');
          document.head.appendChild(meta);
        }
        meta.setAttribute('content', t === 'dark' ? '#0a1e16' : '#ecfdf5');
      } catch (e) { /* ignore */ }
    })();

    window.__arboritoShowBootError = function (message) {
      var loader = document.getElementById('arborito-initial-loader');
      if (!loader || loader.dataset.arboritoDismissed === '1') return;
      loader.dataset.arboritoDismissed = '1';
      loader.style.opacity = '1';
      loader.style.pointerEvents = 'auto';
      loader.innerHTML =
        '<p class="arborito-boot-error">Arborito could not start.<br>' +
        '<span class="arborito-boot-error-detail">' +
        String(message || 'Unknown error').replace(/</g, '&lt;') +
        '</span><br>' +
        '<span class="arborito-boot-error-hint">Try Ctrl+Shift+R or run <code>npm run dev</code> from the project folder.</span></p>';
    };
    window.addEventListener('error', function (ev) {
      var file = (ev && ev.filename) ? String(ev.filename) : '';
      if (file && file.indexOf('/src/') === -1 && file.indexOf('\\src\\') === -1) return;
      var msg = (ev && ev.message) ? ev.message : 'Module error';
      if (file) msg += ', ' + file.split(/[/\\]/).pop();
      window.__arboritoShowBootError(msg);
    });
    window.addEventListener('unhandledrejection', function (ev) {
      var r = ev && ev.reason;
      var msg = (r && r.message) ? r.message : String(r || 'Promise rejected');
      window.__arboritoShowBootError(msg);
    });
  </script>
